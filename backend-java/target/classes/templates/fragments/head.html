<!-- fragments/head.html -->
<head th:fragment="head (title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title != null ? title + ' - DevFlow' : 'DevFlow'}">DevFlow</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- AlpineJS v3 -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- ChartJS for Analytics -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom globals.css -->
    <link rel="stylesheet" th:href="@{/css/globals.css}">

    <!-- Tailwind Config for brand colors and fonts matching Next.js config -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            primary: "#A764FF",
                            deep: "#8957DB",
                            surface: "#0A0718",
                            card: "#101017",
                            light: "#FFFFFF",
                            ink: "#18181B",
                            muted: "#5F5B73",
                        }
                    },
                    boxShadow: {
                        glow: "0 30px 80px rgba(67, 56, 202, 0.35)",
                        panel: "0 24px 70px rgba(7, 9, 23, 0.28)",
                    },
                    borderRadius: {
                        "4xl": "2rem",
                        "5xl": "2.5rem",
                    },
                    backgroundImage: {
                        "hero-gradient": "linear-gradient(135deg, #a764ff 0%, #9f72f3 42%, #8b7be8 100%)",
                    }
                }
            }
        }
    </script>
</head>
