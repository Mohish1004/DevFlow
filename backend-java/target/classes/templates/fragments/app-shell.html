<!-- fragments/app-shell.html -->
<div th:fragment="app-shell (title, currentPath, bodyContent)"
     th:x-data="|{ 
        menuOpen: false, 
        userMenuOpen: false, 
        commandPaletteOpen: false,
        searchQuery: '',
        contextPanelOpen: false,
        contextPanelTitle: '',
        contextPanelBody: '',
        contextPanelMeta: [],
        contextPanelLinks: [],
        openContextPanel(title, body, meta = [], links = []) {
            this.contextPanelTitle = title;
            this.contextPanelBody = body;
            this.contextPanelMeta = meta;
            this.contextPanelLinks = links;
            this.contextPanelOpen = true;
        },
        themeMode: '${preferences != null ? preferences.themeMode : 'dark'}',
        fontStyle: '${preferences != null ? preferences.fontStyle : 'dm-sans'}',
        accentColor: '${preferences != null ? preferences.accentColor : '#a764ff'}',
        borderGlow: ${preferences != null ? preferences.borderGlow : true},
        cardColor: '${preferences != null ? preferences.cardColor : 'rgba(255,255,255,0.06)'}',
        glassIntensity: ${preferences != null ? preferences.glassIntensity : 20},
        graphColor: '${preferences != null ? preferences.graphColor : '#8b7be8'}',
        textColor: '${preferences != null ? preferences.textColor : '#f5f5f6'}',
        navItems: [
            { href: '/app/dashboard', label: 'Dashboard' },
            { href: '/app/projects', label: 'Projects' },
            { href: '/app/tasks', label: 'Tasks' },
            { href: '/app/review', label: 'Review' },
            { href: '/app/docs', label: 'Docs' },
            { href: '/app/meet', label: 'Meet' },
            { href: '/app/analytics', label: 'Analytics' },
            { href: '/app/integrations', label: 'Integrations' },
            { href: '/app/admin', label: 'Admin' },
            { href: '/app/assistant', label: 'Assistant' },
            { href: '/app/settings', label: 'Settings' }
        ],
        init() {
            document.documentElement.setAttribute('data-devflow-theme', this.themeMode);
            document.documentElement.style.setProperty('--workspace-accent', this.accentColor);
            document.documentElement.style.setProperty('--workspace-graph', this.graphColor);
            document.documentElement.style.setProperty('--workspace-glow', this.borderGlow ? '0 0 40px ' + this.accentColor + '26' : 'none');
            document.documentElement.style.setProperty('--workspace-card', this.cardColor);
            document.documentElement.style.setProperty('--workspace-glass-blur', this.glassIntensity + 'px');
            document.documentElement.style.setProperty('--workspace-ink', this.textColor);
            document.documentElement.style.fontFamily = this.fontStyle === 'mono' ? 'JetBrains Mono, monospace' : this.fontStyle === 'system' ? 'system-ui, sans-serif' : 'DM Sans, sans-serif';
            
            // Listen for Ctrl+K
            window.addEventListener('keydown', (e) => {
                if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'k') {
                    e.preventDefault();
                    this.commandPaletteOpen = !this.commandPaletteOpen;
                }
                if (e.key === 'Escape') {
                    this.commandPaletteOpen = false;
                    this.userMenuOpen = false;
                    this.contextPanelOpen = false;
                }
            });
        },
        get filteredItems() {
            if (!this.searchQuery.trim()) return this.navItems;
            return this.navItems.filter(item => item.label.toLowerCase().includes(this.searchQuery.toLowerCase()));
        }
     }|"
     class="workspace-shell workspace-pattern min-h-screen">
    
    <!-- Header -->
    <header class="sticky top-0 z-40 border-b border-white/8 bg-black/10 px-3 py-3 backdrop-blur-md md:px-5">
        <div class="liquid-glass mx-auto flex max-w-[1440px] items-center justify-between rounded-[1.5rem] px-4 py-3">
            <div class="flex items-center gap-3">
                <button aria-label="Open navigation" 
                        class="rounded-full border border-white/10 p-2 text-white/70 md:hidden"
                        @click="menuOpen = !menuOpen" 
                        type="button">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                    </svg>
                </button>
                <a class="text-lg font-semibold tracking-[-0.05em] text-white" href="/app/dashboard">
                    DevFlow
                </a>
                <!-- Demo Badge -->
                <div class="workspace-demo-badge inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[10px] font-semibold uppercase tracking-[0.16em]">
                    <span class="relative flex h-1.5 w-1.5">
                        <span class="absolute inline-flex h-full w-full animate-ping rounded-full bg-white opacity-75"></span>
                        <span class="relative inline-flex h-1.5 w-1.5 rounded-full bg-white"></span>
                    </span>
                    Workspace
                </div>
            </div>
            
            <!-- Desktop Nav -->
            <nav class="hidden flex-wrap items-center gap-2 lg:flex">
                <template x-for="item in navItems" :key="item.href">
                    <a :href="item.href"
                       :class="currentPath === item.href ? 'bg-white/12 text-white' : 'text-white/70 hover:bg-white/8 hover:text-white'"
                       class="rounded-full px-3 py-2 text-sm transition"
                       x-text="item.label">
                    </a>
                </template>
            </nav>
            
            <div class="flex items-center gap-3">
                <!-- Search Button / Cmd+K -->
                <button aria-label="Open command palette"
                        class="hidden items-center gap-2 rounded-full border border-white/10 px-3 py-2 text-sm text-white/70 transition hover:bg-white/8 hover:text-white md:inline-flex"
                        @click="commandPaletteOpen = true"
                        type="button">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                    </svg>
                    Search
                    <span class="rounded-md border border-white/10 px-1.5 py-0.5 text-[10px] uppercase tracking-[0.2em]">
                        Ctrl+K
                    </span>
                </button>
                
                <!-- User Profile Menu -->
                <div class="relative">
                    <button aria-label="Open user menu"
                            class="rounded-full border border-white/10 px-3 py-2 text-sm text-white hover:bg-white/5"
                            @click="userMenuOpen = !userMenuOpen"
                            @click.away="userMenuOpen = false"
                            type="button"
                            th:text="${currentUser != null ? currentUser.displayName : 'Ava'}">
                        Ava
                    </button>
                    <div x-show="userMenuOpen"
                         x-transition:enter="transition ease-out duration-100"
                         x-transition:enter-start="opacity-0 scale-95"
                         x-transition:enter-end="opacity-100 scale-100"
                         x-transition:leave="transition ease-in duration-75"
                         x-transition:leave-start="opacity-100 scale-100"
                         x-transition:leave-end="opacity-0 scale-95"
                         class="liquid-glass absolute right-0 mt-2 w-56 rounded-[1.25rem] p-2"
                         style="display: none;">
                        <div class="px-3 py-2 text-xs uppercase tracking-[0.22em] text-white/55"
                             th:text="${currentUser != null ? #strings.replace(currentUser.accountType.name(), '_', ' ') : 'TEAM LEADER'}">
                            TEAM LEADER
                        </div>
                        <a href="/app/settings" class="block w-full rounded-xl px-3 py-2 text-left text-sm text-white/80 transition hover:bg-white/10 hover:text-white">
                            Settings
                        </a>
                        <a href="/app/appearance" class="block w-full rounded-xl px-3 py-2 text-left text-sm text-white/80 transition hover:bg-white/10 hover:text-white">
                            Appearance
                        </a>
                        
                        <!-- Logout Form -->
                        <form th:action="@{/logout}" method="post" class="block w-full">
                            <button type="submit" class="w-full rounded-xl px-3 py-2 text-left text-sm text-rose-300 transition hover:bg-white/10 hover:text-rose-200">
                                Logout
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Mobile Nav Menu -->
        <div x-show="menuOpen"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             x-transition:leave="transition ease-in duration-150"
             x-transition:leave-start="opacity-100 scale-100"
             x-transition:leave-end="opacity-0 scale-95"
             class="liquid-glass mx-auto mt-3 max-w-[1440px] rounded-[1.5rem] p-3 lg:hidden"
             style="display: none;">
            <div class="grid gap-2">
                <template x-for="item in navItems" :key="item.href">
                    <a :href="item.href"
                       :class="currentPath === item.href ? 'bg-white/12 text-white' : 'text-white/80 hover:bg-white/10 hover:text-white'"
                       class="rounded-2xl px-4 py-3 text-sm transition"
                       x-text="item.label"
                       @click="menuOpen = false">
                    </a>
                </template>
            </div>
        </div>
    </header>

    <!-- Main Workspace Content -->
    <main class="mx-auto max-w-[1440px] px-3 py-6 md:px-5 md:py-8">
        <div th:replace="${bodyContent}"></div>
    </main>

    <!-- Command Palette Dialog -->
    <div x-show="commandPaletteOpen"
         class="fixed inset-0 z-[90] bg-black/50 p-4 backdrop-blur-sm"
         style="display: none;"
         @click.self="commandPaletteOpen = false">
        <div class="liquid-glass mx-auto mt-20 max-w-2xl rounded-[1.75rem] p-4">
            <div class="flex items-center gap-3 rounded-2xl border border-white/10 bg-black/20 px-4 py-3">
                <svg class="h-4 w-4 text-white/60" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
                <input x-model="searchQuery"
                       autoFocus
                       class="w-full bg-transparent text-sm text-white outline-none placeholder:text-white/40"
                       placeholder="Search routes or jump to a workspace area" />
            </div>
            <div class="mt-4 grid gap-2">
                <template x-for="item in filteredItems" :key="item.href">
                    <a :href="item.href"
                       class="rounded-2xl px-4 py-3 text-sm text-white/80 transition hover:bg-white/10 hover:text-white"
                       x-text="item.label"
                       @click="commandPaletteOpen = false">
                    </a>
                </template>
                <div x-show="filteredItems.length === 0" class="text-center py-4 text-sm text-white/40">
                    No results found
                </div>
            </div>
        </div>
    </div>

    <!-- Context Panel Drawer -->
    <div x-show="contextPanelOpen"
         x-transition:enter="transition ease-out duration-300"
         x-transition:enter-start="translate-x-full"
         x-transition:enter-end="translate-x-0"
         x-transition:leave="transition ease-in duration-200"
         x-transition:leave-start="translate-x-0"
         x-transition:leave-end="translate-x-full"
         class="fixed inset-y-0 right-0 z-[80] w-full max-w-md p-4"
         style="display: none;"
         @click.away="contextPanelOpen = false">
        <div class="liquid-glass flex h-full flex-col rounded-[1.75rem] p-5">
            <div class="flex items-start justify-between gap-4">
                <div>
                    <p class="text-2xl font-semibold tracking-[-0.05em]" x-text="contextPanelTitle"></p>
                    <p class="workspace-muted mt-3 text-sm leading-7" x-text="contextPanelBody"></p>
                </div>
                <button aria-label="Close context panel"
                        class="rounded-full border border-white/10 p-2 text-white/70 transition hover:bg-white/10 hover:text-white"
                        @click="contextPanelOpen = false"
                        type="button">
                    <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                    </svg>
                </button>
            </div>
            
            <div class="mt-6 grid gap-2" x-show="contextPanelMeta && contextPanelMeta.length">
                <template x-for="item in contextPanelMeta" :key="item">
                    <div class="workspace-card rounded-2xl px-4 py-3 text-sm" x-text="item"></div>
                </template>
            </div>
            
            <div class="mt-6 grid gap-2" x-show="contextPanelLinks && contextPanelLinks.length">
                <template x-for="link in contextPanelLinks" :key="link.href">
                    <a class="rounded-2xl border border-white/10 px-4 py-3 text-sm text-white/80 transition hover:bg-white/10 hover:text-white"
                       :href="link.href"
                       :target="link.href.startsWith('http') ? '_blank' : undefined"
                       x-text="link.label"></a>
                </template>
            </div>
        </div>
    </div>
</div>
