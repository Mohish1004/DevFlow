<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('DevFlow - Login')}"></head>
<body class="relative min-h-screen overflow-hidden purple-noise text-white">
    <div class="absolute inset-0 purple-grid opacity-30"></div>
    
    <!-- Navbar -->
    <header th:replace="~{fragments/navbar :: navbar}"></header>
    
    <div class="section-shell relative grid min-h-screen items-center gap-10 py-28 lg:grid-cols-[0.9fr,1.1fr]">
        <div class="max-w-2xl">
            <p class="text-xs font-semibold uppercase tracking-[0.3em] text-white/60">Login</p>
            <h1 class="mt-5 text-balance text-5xl font-medium tracking-[-0.07em] text-white sm:text-6xl">
                Re-enter the workspace.
            </h1>
            <p class="mt-5 max-w-xl text-base leading-8 text-white/76 sm:text-lg">
                Enter your workspace to continue collaborating, reviewing pull requests, tracking tasks, and communicating with your team.
            </p>
        </div>
        
        <div>
            <div class="liquid-glass rounded-[2rem] p-8">
                <p class="text-sm font-semibold uppercase tracking-[0.26em] text-white/60">Login</p>
                <h2 class="mt-4 text-3xl font-semibold tracking-[-0.05em] text-white">
                    Enter the workspace.
                </h2>
                
                <!-- Demo Helper Notice -->
                <div class="mt-4 p-3 rounded-xl bg-white/10 border border-white/10 text-xs text-white/80">
                    💡 <strong>Quick Demo Access:</strong><br>
                    Email: <code class="bg-black/30 px-1 rounded select-all font-mono">demo@team.dev</code><br>
                    Password: <code class="bg-black/30 px-1 rounded select-all font-mono">password123</code>
                </div>

                <!-- Error Message -->
                <div th:if="${errorMessage}" class="mt-4 p-3 rounded-xl bg-rose-500/20 border border-rose-500/30 text-sm text-rose-200" th:text="${errorMessage}">
                </div>
                
                <!-- Success Message -->
                <div th:if="${successMessage}" class="mt-4 p-3 rounded-xl bg-emerald-500/20 border border-emerald-500/30 text-sm text-emerald-200" th:text="${successMessage}">
                </div>

                <form class="mt-6 grid gap-5" th:action="@{/login}" method="post">
                    <label class="grid gap-2">
                        <span class="text-sm text-white/80">Email</span>
                        <input class="rounded-2xl border border-white/10 bg-black/20 px-4 py-3 text-white outline-none placeholder:text-white/35"
                               placeholder="you@team.dev"
                               name="email"
                               type="email"
                               value="demo@team.dev"
                               required />
                    </label>
                    <label class="grid gap-2">
                        <span class="text-sm text-white/80">Password</span>
                        <input class="rounded-2xl border border-white/10 bg-black/20 px-4 py-3 text-white outline-none placeholder:text-white/35"
                               placeholder="••••••••"
                               name="password"
                               type="password"
                               value="password123"
                               required />
                    </label>
                    <button class="rounded-full bg-white px-5 py-3 text-sm font-semibold text-zinc-950 transition hover:bg-zinc-100 hover:scale-[1.01]"
                            type="submit">
                        Login
                    </button>
                </form>
                
                <div class="mt-6 flex flex-wrap gap-3 text-sm text-white/72">
                    <a class="hover:text-white transition" href="/signup">
                        Create account
                    </a>
                    <a class="hover:text-white transition" href="/join/DEV-DEMO">
                        Join with team code
                    </a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
