<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('DevFlow - Solutions')}"></head>
<body class="overflow-x-hidden bg-white text-zinc-950">

    <!-- Header / Nav -->
    <header th:replace="~{fragments/navbar :: navbar}"></header>

    <div class="overflow-x-hidden bg-white text-zinc-950">
        <!-- Hero Section -->
        <div class="relative overflow-hidden purple-noise text-white">
            <div class="absolute inset-0 purple-grid opacity-30"></div>
            <section class="relative overflow-hidden pb-16 pt-32 sm:pt-36 lg:pt-40">
                <div class="absolute right-[-8rem] top-[-6rem] h-[34rem] w-[34rem] rounded-full bg-black/40 blur-3xl"></div>
                <div class="section-shell relative">
                    <div class="max-w-4xl">
                        <span class="eyebrow border-white/15 bg-white/8 text-white/70">SOLUTIONS</span>
                        <h1 class="mt-6 max-w-4xl text-balance text-5xl font-medium tracking-[-0.07em] text-white sm:text-6xl lg:text-[5.1rem] leading-none">
                            Designed for agile and growing teams.
                        </h1>
                        <p class="mt-6 max-w-2xl text-lg leading-8 text-white/78">
                            DevFlow caters to various team sizes and structures, enhancing collaboration and productivity for all.
                        </p>
                        <div class="mt-8 flex flex-col gap-3 sm:flex-row">
                            <a class="inline-flex items-center justify-center rounded-full bg-zinc-950 text-white shadow-[0_16px_30px_rgba(9,9,11,0.28)] hover:bg-black h-12 px-6 text-sm font-semibold transition hover:scale-[1.02]" href="/signup">
                                Sign Up
                            </a>
                            <a class="inline-flex items-center justify-center rounded-full bg-white/12 text-white ring-1 ring-white/25 backdrop-blur-xl hover:bg-white/18 h-12 px-6 text-sm font-semibold transition hover:scale-[1.02]" href="/pricing">
                                View Pricing
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Solutions & Stats Content -->
        <div class="relative overflow-hidden bg-[linear-gradient(180deg,#14092f_0%,#241257_55%,#14092f_100%)] text-white">
            <div class="absolute inset-0 dot-pattern opacity-20"></div>
            <div th:replace="~{index :: #solutions}"></div>
            <div th:replace="~{index :: //section[contains(.,'BenefitsStats') or .//span[text()='Benefits']]}"></div>
        </div>

        <!-- Final CTA & Footer -->
        <div class="relative overflow-hidden purple-noise text-white">
            <div class="absolute inset-0 purple-grid opacity-25"></div>
            <div th:replace="~{index :: #final-cta}"></div>
            <footer th:replace="~{fragments/footer :: footer}"></footer>
        </div>
    </div>

</body>
</html>
