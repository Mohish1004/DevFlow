<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('DevFlow Workspace - Docs')}"></head>
<body class="overflow-x-hidden">

    <div th:replace="~{fragments/app-shell :: app-shell('Docs', '/app/docs', ~{::#docs-content})}">
        <div id="docs-content" class="space-y-6">
            
            <!-- Page Header -->
            <div class="space-y-2">
                <span class="eyebrow border-white/10 bg-white/5 text-white/70">Docs</span>
                <h1 class="text-3xl font-semibold tracking-[-0.05em] text-white">Documentation that lives beside the work</h1>
                <p class="workspace-muted text-sm max-w-3xl leading-7">
                    Docs should stay attached to the same work context as projects, tasks, reviews, and meetings.
                </p>
            </div>

            <!-- Docs Cards Grid -->
            <div class="grid gap-4 xl:grid-cols-3">
                <button class="workspace-card rounded-[1.75rem] p-6 text-left hover:-translate-y-0.5 transition"
                        @click="openContextPanel('Platform Docs', 'Security decisions, auth flow, API contracts, and migration notes.', ['Markdown-ready', 'Review-linked', 'Activity aware'], [{href: '/app/tasks', label: 'Related task context'}])"
                        type="button">
                    <span class="text-xl">📖</span>
                    <h2 class="mt-4 text-2xl font-semibold tracking-[-0.04em] text-white">Platform Docs</h2>
                    <p class="workspace-muted mt-3 text-sm leading-7">Security decisions, auth flow, API contracts, and migration notes.</p>
                    <div class="mt-4 inline-flex items-center gap-2 text-sm text-white/80 hover:text-white">
                        Open context ↗
                    </div>
                </button>
                
                <button class="workspace-card rounded-[1.75rem] p-6 text-left hover:-translate-y-0.5 transition"
                        @click="openContextPanel('Release Notes', 'Shared launch notes, release checklist, and test sign-off.', ['Markdown-ready', 'Review-linked', 'Activity aware'], [{href: '/app/tasks', label: 'Related task context'}])"
                        type="button">
                    <span class="text-xl">🚀</span>
                    <h2 class="mt-4 text-2xl font-semibold tracking-[-0.04em] text-white">Release Notes</h2>
                    <p class="workspace-muted mt-3 text-sm leading-7">Shared launch notes, release checklist, and test sign-off.</p>
                    <div class="mt-4 inline-flex items-center gap-2 text-sm text-white/80 hover:text-white">
                        Open context ↗
                    </div>
                </button>

                <button class="workspace-card rounded-[1.75rem] p-6 text-left hover:-translate-y-0.5 transition"
                        @click="openContextPanel('Team Playbooks', 'Context-rich onboarding tied to tasks, reviews, and team activity.', ['Markdown-ready', 'Review-linked', 'Activity aware'], [{href: '/app/tasks', label: 'Related task context'}])"
                        type="button">
                    <span class="text-xl">📚</span>
                    <h2 class="mt-4 text-2xl font-semibold tracking-[-0.04em] text-white">Team Playbooks</h2>
                    <p class="workspace-muted mt-3 text-sm leading-7">Context-rich onboarding tied to tasks, reviews, and team activity.</p>
                    <div class="mt-4 inline-flex items-center gap-2 text-sm text-white/80 hover:text-white">
                        Open context ↗
                    </div>
                </button>
            </div>

            <!-- Empty State -->
            <div class="rounded-[1.75rem] border border-white/10 bg-white/[0.02] p-8 text-center">
                <div class="mx-auto flex h-12 w-12 items-center justify-center rounded-full bg-white/5 text-white/60">
                    📭
                </div>
                <h3 class="mt-4 text-lg font-semibold text-white">No draft documents waiting</h3>
                <p class="workspace-muted mt-2 text-sm max-w-sm mx-auto leading-6">
                    No empty doc stubs have been created yet. When the Java backend is added, drafts and published docs should separate cleanly.
                </p>
            </div>

        </div>
    </div>

</body>
</html>
