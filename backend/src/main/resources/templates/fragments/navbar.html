<!-- fragments/navbar.html -->
<header th:fragment="navbar" 
        x-data="{ isOpen: false, isScrolled: false }" 
        x-init="isScrolled = window.scrollY > 18; window.addEventListener('scroll', () => { isScrolled = window.scrollY > 18 })"
        class="fixed inset-x-0 top-0 z-50 px-3 pt-4 md:px-5">
    
    <div :class="isScrolled ? 'glass bg-white/18 shadow-[0_24px_50px_rgba(13,10,26,0.28)]' : 'glass bg-white/10'" 
         class="section-shell rounded-full transition duration-300">
        <div class="flex items-center justify-between px-5 py-3">
            
            <!-- Logo -->
            <a class="inline-flex items-center gap-3" href="/">
                <span class="text-lg font-medium tracking-[-0.05em] text-white">DevFlow</span>
            </a>
            
            <!-- Desktop Navigation -->
            <nav class="hidden items-center gap-8 md:flex">
                <a class="text-sm font-medium transition text-white/75 hover:text-white" href="/product">Product</a>
                <a class="text-sm font-medium transition text-white/75 hover:text-white" href="/features">Features</a>
                <a class="text-sm font-medium transition text-white/75 hover:text-white" href="/solutions">Solutions</a>
                <a class="text-sm font-medium transition text-white/75 hover:text-white" href="/pricing">Pricing</a>
            </nav>
            
            <!-- Auth CTA -->
            <div class="hidden md:block">
                <a class="inline-flex items-center justify-center rounded-full bg-white px-5 py-2.5 text-sm font-semibold text-zinc-950 transition hover:bg-zinc-100" href="/signup">
                    Sign Up
                    <svg class="ml-1.5 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                    </svg>
                </a>
            </div>
            
            <!-- Mobile Toggle -->
            <button aria-label="Open navigation menu" 
                    class="inline-flex h-10 w-10 items-center justify-center rounded-full bg-white/10 text-white ring-1 ring-white/20 transition hover:bg-white/16 md:hidden"
                    @click="isOpen = !isOpen" 
                    type="button">
                <svg x-show="!isOpen" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
                <svg x-show="isOpen" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display: none;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>
    
    <!-- Mobile Navigation Menu -->
    <div x-show="isOpen" 
         x-transition:enter="transition ease-out duration-200"
         x-transition:enter-start="opacity-0 -translate-y-2"
         x-transition:enter-end="opacity-100 translate-y-0"
         x-transition:leave="transition ease-in duration-150"
         x-transition:leave-start="opacity-100 translate-y-0"
         x-transition:leave-end="opacity-0 -translate-y-2"
         class="section-shell glass mt-3 overflow-hidden rounded-[2rem] bg-white/14 text-white md:hidden"
         style="display: none;">
        <div class="flex flex-col gap-2 p-4">
            <a class="rounded-2xl px-4 py-3 text-sm font-medium transition text-white/80 hover:bg-white/10 hover:text-white" href="/product" @click="isOpen = false">Product</a>
            <a class="rounded-2xl px-4 py-3 text-sm font-medium transition text-white/80 hover:bg-white/10 hover:text-white" href="/features" @click="isOpen = false">Features</a>
            <a class="rounded-2xl px-4 py-3 text-sm font-medium transition text-white/80 hover:bg-white/10 hover:text-white" href="/solutions" @click="isOpen = false">Solutions</a>
            <a class="rounded-2xl px-4 py-3 text-sm font-medium transition text-white/80 hover:bg-white/10 hover:text-white" href="/pricing" @click="isOpen = false">Pricing</a>
            <a class="mt-2 w-full inline-flex items-center justify-center rounded-full bg-white px-5 py-3 text-sm font-semibold text-zinc-950 transition hover:bg-zinc-100" href="/signup" @click="isOpen = false">
                Sign Up
                <svg class="ml-1.5 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </a>
        </div>
    </div>
</header>
