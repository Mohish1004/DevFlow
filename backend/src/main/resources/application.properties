spring.application.name=devflow

# Server configuration
server.port=8080

# Thymeleaf settings
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.cache=false

# Firebase Admin SDK (set via env var in production)
firebase.service-account=${FIREBASE_SERVICE_ACCOUNT_JSON:}

# CORS (comma-separated origins, supports wildcards)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,https://*.vercel.app}

# --- Database (H2 for local dev, PostgreSQL via env vars in production) ---
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:devflowdb;DB_CLOSE_DELAY=-1}
spring.datasource.driverClassName=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (enabled only for dev)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# Security
spring.headers.frame-options=sameorigin

